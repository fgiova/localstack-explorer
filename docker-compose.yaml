services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=${ENABLED_SERVICES:-s3,sqs,sns,iam,cloudformation,dynamodb}
      - DEBUG=0
      - EAGER_SERVICE_LOADING=1
    volumes:
      - localstack-data:/var/lib/localstack

volumes:
  localstack-data:
